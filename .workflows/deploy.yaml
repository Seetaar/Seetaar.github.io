name: Deploy MkDocs Site

on:
  push:
    branches:
      -main

permissions:
  contents: write

jobs:
  built:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: '1. Checkout main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: '2. Initialize Python Environment'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: '3. Install Project Dependencies'
        run:
          pip install -r requirements.txt

      - name: '4. Built and Push to GitHub Pages'
        run:
          mkdocs gh-deploy --config-file mkdocs.yml --force --clean